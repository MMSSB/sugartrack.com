<!-- settings.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="images/sugar.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - SugarTrack</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="fontawesome-free-6.7.2-web/css/all.css">
</head>
<body>


    <div class="app-container" id="appContainer">
        <!-- Mobile Hamburger Button -->
        <button class="hamburger-btn mobile-only">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                
               <a href="index.html"><div class="logo2">ST</div></a>
                 <a href="index.html"><span class="app-name">SugarTrack Beta</span></a>
                
                <button class="close-btn mobile-only">
                    <i class="fas fa-times"></i>
                </button>

            </div>
            <hr>
            <div class="sidebar-menu">
                <a href="index.html" class="menu-item ">
                    <i class="fas fa-home"></i>
                    <span class="menu-text">Dashboard</span>
                </a>
                <a href="settings.html" class="menu-item active">
                    <i class="fas fa-cog"></i>
                    <span class="menu-text">Settings</span>
                </a>
            </div>
            <div class="sidebar-footer">
                <button class="buttonlogout" id="logoutButton">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="menu-text">Logout</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <div class="main-content">
            <nav class="top-nav">
                <div class="nav-content">
                    <div class="nav-left">
                        <button class="toggle-collapse desktop-only">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                    <a href="index.html"><div class="logo mobile-only">ST</div></a>
     <a href="settings.html"><span>Hey, <span id="userWelcomeName"></span></span>   </a>                 
                    </div>
                    <div class="nav-right">
                        <!-- <span id="currentDateTime"></span>
                        <span id="readingsCount">0 Readings</span> -->
                    </div>
                </div>
            </nav>

            <main>
                <div class="content-card">
                    <h2>Settings</h2>
                    <div class="input-group">
                        <label for="themeSelect">Theme</label>
                        <select id="themeSelect">
                            <option value="system">System Default</option>
                            <option value="light">Light Mode</option>
                            <option value="dark">Dark Mode</option>
                        </select>
                    </div>
                </div>
                <div class="content-card">
                    <h2>Profile Settings</h2>
                    <div class="settings-section">
                        <div class="input-group">
                            <label>First Name</label>
                            <div class="reading-input">
                                <input type="text" id="firstName" placeholder="Enter first name">
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Last Name</label>
                            <div class="reading-input">
                                <input type="text" id="lastName" placeholder="Enter last name">
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Email</label>
                            <div class="reading-input">
                                <input type="email" id="userEmail" disabled>
                            </div>
                        </div>
                        <button id="updateProfileButton" class="settings-buttonsave">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </div>
                </div>

                <div class="content-card">
                    <h2>Change Password</h2>
                    <div class="settings-section">
                        <div class="input-group">
                            <label>Current Password</label>
                            <div class="reading-input">
                                <input type="password" id="currentPassword" placeholder="Enter current password">
                            </div>
                        </div>
                        <div class="input-group">
                            <label>New Password</label>
                            <div class="reading-input">
                                <input type="password" id="newPassword" placeholder="Enter new password">
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Confirm New Password</label>
                            <div class="reading-input">
                                <input type="password" id="confirmPassword" placeholder="Confirm new password">
                            </div>
                        </div>
                        <button id="changePasswordButton" class="settings-buttonupdate">
                            <i class="fas fa-key"></i> Update Password
                        </button>
                    </div>
                </div>

                <div class="content-card">
                    <h2>Delete Account</h2>
                    <div class="settings-section">
                        <p class="warning-text">Warning: This action cannot be undone. All your data will be permanently deleted.</p>
                        <button id="deleteAccountButton" class="settings-buttondelete danger-button">
                            <i class="fas fa-trash-alt"></i> Delete Account
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>
<div id="mms-overlay">
    <a href="https://mmssb.github.io/" target="_blank" rel="noopener noreferrer">
      <img src="https://mmssb.github.io/assets/images/mmslogo.PNG" alt="MMS Logo" class="mms-logo">
      <span>Made by MMS</span>
    </a>
  </div>


  <!-- Add these right before the closing </head> tag -->
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="securityFlase.js"></script>
    <script src="./settings.js"></script>
        <script src="security.js"></script>

</body>
</html>
