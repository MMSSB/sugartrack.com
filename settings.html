<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="images/sugar.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - SugarTrack</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/all.css">

</head>
<body>
    <div class="app-container">
        <nav class="top-nav">
            <div class="nav-content">
                <div class="nav-left">
                    <a href="index.html"> <div class="logo">ST</div></a>
                    <a href="index.html"><span>SugarTrack</span></a>
                    <a href="index.html"><i class="fa-solid fa-home"></i></a>
                    <a href="beta/index.html"><i class="fa-solid fa-bolt"></i></a>

                </div>
                <div class="nav-right">
                    <!-- <a href="index.html" class="nav-link">Home</a>

                    <a href="settings.html" class="nav-link active">Settings</a> -->
                    <span>Welcome, <span id="userWelcomeName"></span></span>
                    <span id="currentDateTime"></span>
                </div>
            </div>
        </nav>

        <main>
            <div class="content-card">
                <h2>Settings</h2>
                <div class="input-group">
                    <label>Theme</label>
                    <select id="themeSelect">
                        <option value="system">System Default</option>
                        <option value="light">Light Mode</option>
                        <option value="dark">Dark Mode</option>
                    </select>
                </div>

                </div>
                <div class="content-card">
                <div class="input-group">
                    <label>Change Name</label>
                    <div class="reading-input">
                        <input type="text" id="newName" placeholder="Enter new name">
                        <button id="changeNameButton">Update</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
<div id="mms-overlay">
    <a href="https://mmssb.github.io/" target="_blank" rel="noopener noreferrer">
      <img src="https://mmssb.github.io/assets/images/mmslogo.PNG" alt="MMS Logo" class="mms-logo">
      <span>Made by MMS</span>
    </a>
  </div>
    <script src="./settings.js"></script>
</body>
</html>
